name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            **Install:**
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/rroos64/ai-agent-quota-monitor/${{ github.ref_name }}/install.sh)
            ```

            See [CHANGELOG](https://github.com/rroos64/ai-agent-quota-monitor/commits/${{ github.ref_name }}) for what changed.
